services:
  - type: web
    name: examai-hub-api
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SECRET_KEY
        value: a3f8b2c1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
      - key: FRONTEND_URL
        value: https://examaihub.com
      - key: CORS_ORIGINS
        value: https://examaihub.com
      - key: PAYPAL_MODE
        value: sandbox
      - key: DATABASE_URL
        value: sqlite:///./school_helper.db
      - key: PORT
        value: "10000"
